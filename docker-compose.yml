# SAI - Sistema Ambiental Integrado
# Docker Compose para Dokploy

version: '3.8'

services:
  # ============================================
  # BASE DE DATOS
  # ============================================
  
  postgres:
    image: postgres:16-alpine
    container_name: sai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: sai_db
      POSTGRES_USER: ${POSTGRES_USER:-sai_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sai_password_2026}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - sai-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sai_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # REDIS - Caché y Colas
  # ============================================
  
  redis:
    image: redis:7-alpine
    container_name: sai-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - sai-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # MINIO - Almacenamiento S3
  # ============================================
  
  minio:
    image: minio/minio:latest
    container_name: sai-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minio_admin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minio_password_2026}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - sai-network
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================
  # BACKEND - NestJS API
  # ============================================
  
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sai-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER:-sai_user}:${POSTGRES_PASSWORD:-sai_password_2026}@postgres:5432/sai_db?schema=public
      JWT_SECRET: ${JWT_SECRET:-super_secret_key_sai_2026_change_in_production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-super_secret_refresh_key_sai_2026_change_in_production}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minio_admin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minio_password_2026}
      MINIO_BUCKET_NAME: sai-documents
      MINIO_USE_SSL: "false"
      API_PREFIX: api/v1
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3002}
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - sai-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================
  # FRONTEND - Next.js
  # ============================================
  
  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001/api/v1}
    container_name: sai-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001/api/v1}
      PORT: 3002
    ports:
      - "3002:3002"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - sai-network

# ============================================
# VOLUMES
# ============================================

volumes:
  postgres_data:
  redis_data:
  minio_data:

# ============================================
# REDES
# ============================================

networks:
  sai-network:
    driver: bridge
